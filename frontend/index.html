<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header" role="banner">
      <h1 class="app-title">Family Videos</h1>
      <p class="app-subtitle">Drag to a year to browse</p>
      <nav class="timeline content-hidden" role="navigation" aria-label="Year timeline">
        <div class="timeline-year-display" aria-live="polite"></div>
        <div class="timeline-scrubber">
          <div class="scrubber-track">
            <div class="scrubber-handle" role="slider" aria-label="Year selector" tabindex="0"></div>
          </div>
        </div>
        <div class="timeline-labels"></div>
      </nav>
    </header>

    <div class="sr-only" aria-live="polite" id="sr-announcements"></div>

    <main class="content" role="main">
      <div id="skeleton" class="skeleton">
        <div class="skeleton-header">
          <div class="skeleton-title"></div>
          <div class="skeleton-subtitle"></div>
        </div>
        <div class="skeleton-timeline"></div>
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

      <div id="video-content" class="content-hidden"></div>

      <div id="error-state" class="error-state">
        <p>Couldn't load videos</p>
        <button id="retry-btn" type="button">Try Again</button>
      </div>
    </main>
  </div>

  <div id="player-overlay" class="player-overlay" role="region" aria-label="Video player">
    <div class="player-container">
      <button class="player-close" id="player-close-btn" type="button" aria-label="Close video player">&times;</button>
      <video id="player-video" controls playsinline></video>
      <div class="player-error" id="player-error">
        <p>This video isn't available</p>
        <button id="player-error-close" type="button">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

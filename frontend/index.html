<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#2D2824" media="(prefers-color-scheme: dark)">
  <title>Family Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar" role="banner">
      <div class="top-bar-inner">
        <h1 class="app-title">Family Videos</h1>
        <nav class="top-timeline content-hidden" role="navigation" aria-label="Year timeline">
          <button class="timeline-chevron timeline-chevron-left" type="button" aria-label="Previous year">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="15,6 9,12 15,18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="timeline-scrubber">
            <div class="timeline-rail">
              <div class="scrubber-track">
                <div class="scrubber-handle" role="slider" aria-label="Year selector" tabindex="0"></div>
              </div>
              <div class="timeline-labels"></div>
            </div>
          </div>
          <button class="timeline-chevron timeline-chevron-right" type="button" aria-label="Next year">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="9,6 15,12 9,18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </nav>
      </div>
    </header>

    <div class="sr-only" aria-live="polite" id="sr-announcements"></div>

    <div class="app-layout">
      <aside class="spine content-hidden" aria-label="Current year">
        <button class="spine-chevron spine-chevron-up" type="button" aria-label="Previous year">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="6,15 12,9 18,15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="spine-year" id="spine-year" aria-hidden="true"></div>
        <button class="spine-chevron spine-chevron-down" type="button" aria-label="Next year">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="6,9 12,15 18,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </aside>

      <main class="content-column" role="main">
        <div id="skeleton" class="skeleton">
          <div class="skeleton-header">
            <div class="skeleton-title"></div>
            <div class="skeleton-subtitle"></div>
          </div>
          <div class="skeleton-timeline"></div>
          <div class="skeleton-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>

        <div id="video-content" class="content-hidden"></div>

        <div id="error-state" class="error-state">
          <p>Couldn't load videos</p>
          <button id="retry-btn" type="button">Try Again</button>
        </div>
      </main>
    </div>
  </div>

  <div id="player-overlay" class="player-overlay" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="player-container">
      <button class="player-close" id="player-close-btn" type="button" aria-label="Close video player">&times;</button>
      <video id="player-video" controls playsinline></video>
      <div class="player-error" id="player-error">
        <p>This video isn't available</p>
        <button id="player-error-close" type="button">Close</button>
      </div>
    </div>
  </div>

  <div id="cover-overlay" class="cover-overlay" role="dialog" aria-modal="true" aria-label="DVD cover viewer">
    <button class="cover-close" id="cover-close-btn" type="button" aria-label="Close cover viewer">&times;</button>
    <img id="cover-image" class="cover-image" alt="">
  </div>

  <script src="app.js"></script>
</body>
</html>

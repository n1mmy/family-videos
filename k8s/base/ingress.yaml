apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: family-videos
  labels:
    app: family-videos
spec:
  ingressClassName: nginx
  rules:
    - host: videos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: family-videos
                port:
                  number: 80
  tls:
    - hosts:
        - videos.example.com

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    gzip on;
    gzip_types application/json text/html text/css application/javascript;
    gzip_min_length 256;

    # Use real client IP behind ingress controller (not the proxy IP)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Rate limiting: 5 req/s per real client IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        # HTTP Basic Auth — .htpasswd mounted as k8s Secret
        auth_basic "Family Videos";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Frontend SPA files
        root /usr/share/nginx/html;
        index index.html;

        # Rate limit SPA/manifest requests (brute-force protection on auth)
        # Static assets (videos/thumbs/covers) are excluded — a page load
        # fetches ~20 thumbnails at once and would hit the limit immediately.
        location = /manifest.json {
            limit_req zone=auth burst=5 nodelay;
            alias /data/served/manifest.json;
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            types { application/json json; }
        }

        # Videos — immutable cache (cache-busted via ?v=<hash>)
        location /videos/ {
            alias /data/served/videos/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            types { video/mp4 mp4; }
        }

        # Thumbnails — immutable cache
        location /thumbs/ {
            alias /data/served/thumbs/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            types { image/jpeg jpg jpeg; }
        }

        # Covers — immutable cache
        location /covers/ {
            alias /data/served/covers/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            types { image/jpeg jpg jpeg; }
        }

        # Health check — serves .healthz marker from PVC to detect Ceph failures.
        # No auth so k8s probe can reach it. Leaks nothing (file contains "ok").
        location = /healthz {
            auth_basic off;
            alias /data/served/.healthz;
        }

        # SPA fallback
        location / {
            limit_req zone=auth burst=5 nodelay;
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            try_files $uri $uri/ /index.html;
        }
    }
}

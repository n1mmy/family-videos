worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    # Rate limiting: 5 req/s per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    server {
        listen 80;
        server_name _;

        # HTTP Basic Auth — .htpasswd mounted as k8s Secret
        auth_basic "Family Videos";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        # Rate limit all requests
        limit_req zone=auth burst=5 nodelay;

        # Frontend SPA files
        root /usr/share/nginx/html;
        index index.html;

        # manifest.json — no cache (always fetch latest)
        location = /manifest.json {
            alias /data/served/manifest.json;
            add_header Cache-Control "no-cache";
            types { application/json json; }
        }

        # Videos — immutable cache (cache-busted via ?v=<hash>)
        location /videos/ {
            alias /data/served/videos/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            types { video/mp4 mp4; }
        }

        # Thumbnails — immutable cache
        location /thumbs/ {
            alias /data/served/thumbs/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            types { image/jpeg jpg jpeg; }
        }

        # Covers — immutable cache
        location /covers/ {
            alias /data/served/covers/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            types { image/jpeg jpg jpeg; }
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
